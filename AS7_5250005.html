<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="L7.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>AS7 5250005 Boonsiri Masan </title>
</head>
<body>
  
     <div class="video-container">
        <!-- วิดีโอ -->
        <video id="videoPlayer" autoplay loop muted>
            <source src="204006-923133925_small.mp4" type="video/mp4">
        </video>

        <!-- การ์ดฟุตเตอร์สำหรับปุ่ม Play และ Stop -->
        <div class="video-controls">
            <button class="btn btn-warning" onclick="document.querySelector('video').play()">
                <i class="bi bi-play-circle"></i> Play
                
            </button>
            <button class="btn btn-danger" onclick="document.querySelector('video').pause()">
                <i class="bi bi-stop-circle"></i> Stop
            </button>
        </div>

        <!-- ฟอร์มลงทะเบียนภายในวิดีโอ -->
        <div class="form-container">
            <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="fullname">ชื่อ-นามสกุล:</label>
                    <input type="text" id="fullname" name="fullname" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                </div>

                <div class="form-group">
                    <label for="email">อีเมล:</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="example@domain.com" required>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน:</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>เพศ:</label>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="male" name="gender" value="male" class="form-check-input">
                        <label for="male" class="form-check-label">ชาย</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="female" name="gender" value="female" class="form-check-input">
                        <label for="female" class="form-check-label">หญิง</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="interests">ตำแหน่ง:</label>
                    <select name="interests[]" id="interests" class="form-control">
                        <option value="web">Web Development</option>
                        <option value="mobile">Mobile App</option>
                    </select>
                </div>

                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary btn-lg">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-danger btn-lg">ล้างข้อมูล</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
